  <text x="42" y="63" fill="#89939E" font-family="Segoe UI,Arial,sans-serif" font-size="11">Tecnologías visibles en los repositorios públicos</text>

  <g font-family="Segoe UI,Arial,sans-serif" font-size="12">
    <rect x="26" y="91" width="118" height="30" rx="15" fill="#12171D" stroke="#3178C6"/>
