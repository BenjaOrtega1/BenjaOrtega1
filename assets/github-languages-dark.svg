  <line x1="26" y1="143" x2="534" y2="143" stroke="#26303A"/>
  <text x="26" y="164" fill="#00C8FF" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">React + Supabase</text>
  <text x="157" y="164" fill="#89939E" font-family="Segoe UI,Arial,sans-serif" font-size="12">·</text>
  <text x="177" y="164" fill="#FF3B3B" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">IoT + MQTT</text>
  <text x="274" y="164" fill="#89939E" font-family="Segoe UI,Arial,sans-serif" font-size="12">·</text>
  <text x="294" y="164" fill="#E8EDF2" font-family="Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">Experiencias 3D</text>
