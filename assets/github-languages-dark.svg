  <desc id="desc">TypeScript, JavaScript, C++ y Shell aparecen en los repositorios públicos.</desc>
  <rect x="1" y="1" width="558" height="188" rx="18" fill="#0D1117" stroke="#30363D"/>
  <rect x="24" y="24" width="4" height="34" rx="2" fill="#00C8FF"/>
