    <text x="185" y="110" fill="#C9D1D9">JavaScript</text>

    <rect x="290" y="91" width="86" height="30" rx="15" fill="#12171D" stroke="#F34B7D"/>
    <circle cx="307" cy="106" r="5" fill="#F34B7D"/>
    <text x="319" y="110" fill="#C9D1D9">C++</text>

    <rect x="388" y="91" width="82" height="30" rx="15" fill="#12171D" stroke="#89E051"/>
