<svg xmlns="http://www.w3.org/2000/svg" width="560" height="190" viewBox="0 0 560 190" role="img" aria-labelledby="title desc">
  <title id="title">Lenguajes y enfoque técnico de Benjamin Ortega</title>
  <desc id="desc">TypeScript, JavaScript, C++ y Shell aparecen en los repositorios públicos.</desc>
  <rect x="1" y="1" width="558" height="188" rx="18" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="24" y="24" width="4" height="34" rx="2" fill="#007F9E"/>
  <text x="42" y="44" fill="#1F2328" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Lenguajes y enfoque</text>
  <text x="42" y="63" fill="#57606A" font-family="Segoe UI,Arial,sans-serif" font-size="11">Tecnologías visibles en los repositorios públicos</text>

  <g font-family="Segoe UI,Arial,sans-serif" font-size="12">
    <rect x="26" y="91" width="118" height="30" rx="15" fill="#F6F8FA" stroke="#3178C6"/>
    <circle cx="43" cy="106" r="5" fill="#3178C6"/>
