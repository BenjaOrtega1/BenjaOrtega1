<svg xmlns="http://www.w3.org/2000/svg" width="560" height="190" viewBox="0 0 560 190" role="img" aria-labelledby="title desc">
  <title id="title">Resumen de GitHub de Benjamin Ortega</title>
  <desc id="desc">Siete repositorios públicos, cinco proyectos destacados y tres áreas principales.</desc>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#007F9E"/>
      <stop offset="1" stop-color="#E33333"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="558" height="188" rx="18" fill="#FFFFFF" stroke="#D0D7DE"/>
  <rect x="24" y="24" width="4" height="34" rx="2" fill="url(#line)"/>
  <text x="42" y="44" fill="#1F2328" font-family="Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">GitHub en números</text>
  <text x="42" y="63" fill="#57606A" font-family="Segoe UI,Arial,sans-serif" font-size="11">Resumen del perfil público</text>

  <g transform="translate(26 91)">
    <rect width="150" height="72" rx="12" fill="#F6F8FA" stroke="#D8DEE4"/>
    <text x="18" y="31" fill="#007F9E" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">7</text>
    <text x="18" y="53" fill="#24292F" font-family="Segoe UI,Arial,sans-serif" font-size="12">repositorios públicos</text>
  </g>
  <g transform="translate(205 91)">
    <rect width="150" height="72" rx="12" fill="#F6F8FA" stroke="#D8DEE4"/>
    <text x="18" y="31" fill="#E33333" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">5</text>
    <text x="18" y="53" fill="#24292F" font-family="Segoe UI,Arial,sans-serif" font-size="12">proyectos destacados</text>
  </g>
  <g transform="translate(384 91)">
    <rect width="150" height="72" rx="12" fill="#F6F8FA" stroke="#D8DEE4"/>
    <text x="18" y="31" fill="#007F9E" font-family="Segoe UI,Arial,sans-serif" font-size="25" font-weight="700">3</text>
    <text x="18" y="53" fill="#24292F" font-family="Segoe UI,Arial,sans-serif" font-size="12">áreas de enfoque</text>
  </g>
</svg>
